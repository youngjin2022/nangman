[phases.setup]
nixPkgs = ['nodejs_20', 'nodePackages.pnpm', 'openssl']

[phases.install]
cmds = ['pnpm install --no-frozen-lockfile']

[phases.build]
cmds = ['pnpm prisma generate && pnpm tsc -p tsconfig.json']

[start]
cmd = 'pnpm prisma migrate deploy && node dist/main.js'

[variables]
NODE_ENV = 'production'