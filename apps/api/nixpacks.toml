[phases.setup]
nixPkgs = ['nodejs_20', 'openssl']

[phases.install]
cmds = ['corepack enable && corepack prepare pnpm@9.6.0 --activate && pnpm install --frozen-lockfile']

[phases.build]
cmds = ['pnpm prisma generate && pnpm tsc -p tsconfig.json']

[start]
cmd = 'pnpm prisma migrate deploy && node dist/main.js'

[variables]
NODE_ENV = 'production'