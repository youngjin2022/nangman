[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g pnpm@9",
  "cd ../.. && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "cd ../.. && pnpm --filter api run build"
]

[start]
cmd = "cd apps/api && npx prisma migrate deploy && node dist/main.js"

[variables]
NODE_ENV = "production"
